<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>西语外刊阅读器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #f7f4ef;
      color: #1a1a1a;
      padding: 48px 12px;
      font-size: 15px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* ── 顶部刊头 ── */
    header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 2px solid #1a1a1a;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #1a1a1a;
    }
    header p {
      font-size: 0.72rem;
      color: #888;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── 文章卡片列表 ── */
    #article-list { display: block; }
    .article-card-link {
      display: block;
      padding: 24px 0;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .article-card-link:hover { opacity: 0.6; }
    .card-title {
      font-size: 1.15rem;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .card-meta {
      font-size: 0.72rem;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── 阅读视图 ── */
    #reader-view { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      color: #999;
      margin-bottom: 36px;
      padding: 0;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #1a1a1a; }

    /* ── 文章主体 ── */
    .article-box {
      background: #fff;
      border-radius: 2px;
      padding: 48px 40px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .article-label {
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c0392b;
      margin-bottom: 12px;
    }
    .article-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .article-meta {
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 24px;
      margin-bottom: 28px;
      border-bottom: 1px solid #eee;
    }

    /* ── 引言 ── */
    .intro-block {
      margin-bottom: 36px;
      padding: 20px 24px;
      border-left: 3px solid #1a1a1a;
      background: #fafafa;
    }
    .intro-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }
    .intro-es {
      font-size: 0.88rem;
      line-height: 1.8;
      color: #333;
      margin-bottom: 10px;
      font-style: italic;
    }
    .intro-zh {
      font-size: 0.82rem;
      line-height: 1.75;
      color: #777;
    }

    /* ── 段落 ── */
    .paragraph-block {
      margin-bottom: 32px;
    }

    .es-text {
      font-size: 0.92rem;
      line-height: 1.95;
      color: #1a1a1a;
      margin-bottom: 14px;
    }

    /* 关键词：蓝色下划线 */
    .key-word {
      color: #2563b0;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }

    /* ── 中文翻译 ── */
    .zh-translation {
      padding: 14px 18px;
      background: #f4f4f4;
      border-radius: 2px;
      font-size: 0.82rem;
      color: #555;
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .zh-label {
      font-size: 0.62rem;
      color: #bbb;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── 词汇表 ── */
    .words-block {
      border-top: 1px solid #eee;
      padding-top: 14px;
    }
    .words-label {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
    }
    .word-item {
      margin-bottom: 10px;
      font-size: 0.78rem;
      line-height: 1.65;
      padding-left: 10px;
      border-left: 2px solid #e0e0e0;
    }
    .word-item:last-child { margin-bottom: 0; }
    .word-term {
      font-weight: bold;
      color: #2563b0;
    }
    .word-def { color: #444; }
    .word-usage {
      color: #888;
      font-size: 0.74rem;
      display: block;
      margin-top: 2px;
    }

    /* ── 段落分隔线 ── */
    .para-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 32px 0;
    }

    #empty-tip {
      text-align: center; color: #bbb;
      font-size: 0.9rem; padding: 60px 0;
      display: none;
    }

    /* ── 手机适配 ── */
    @media (max-width: 600px) {
      body { padding: 24px 12px; font-size: 15px; }
      .article-box { padding: 28px 20px; }
      .article-title { font-size: 1.25rem; }
      .es-text { font-size: 0.97rem; line-height: 2; }
      .zh-translation { font-size: 0.88rem; }
      .word-item { font-size: 0.84rem; }
    }

    /* ── 打印 ── */
    @media print {
      body { background: #fff; padding: 0; }
      .back-btn, header { display: none; }
      .article-box { box-shadow: none; padding: 0; }
      .paragraph-block { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>西班牙语外刊阅读</h1>
    <p>公众号【西语SuperO】</p>
  </header>

  <div id="article-list">
    <div id="cards-container"></div>
    <div id="empty-tip">暂无文章，请添加 articles/index.json 📂</div>
  </div>

  <div id="reader-view">
    <button class="back-btn" id="back-btn">← Volver</button>
    <div class="article-box">
      <div class="article-label">El País · Análisis</div>
      <div class="article-title" id="reader-title"></div>
      <div class="article-meta"  id="reader-meta"></div>
      <div id="reader-body"></div>
    </div>
  </div>

</div>

<script>
const INDEX_FILE = "articles/index.json";

async function init() {
  try {
    const res = await fetch(INDEX_FILE);
    if (!res.ok) throw new Error();
    const fileList = await res.json();
    if (!fileList.length) {
      document.getElementById("empty-tip").style.display = "block";
      return;
    }
    const container = document.getElementById("cards-container");
    for (const filePath of fileList) {
      try {
        const r = await fetch(filePath);
        if (!r.ok) throw new Error();
        const data = await r.json();
        const card = document.createElement("div");
        card.className = "article-card-link";
        card.innerHTML = `
          <div class="card-title">${data.title}</div>
          <div class="card-meta">${data.source} &nbsp;·&nbsp; ${data.date}</div>
        `;
        card.addEventListener("click", () => openArticle(data));
        container.appendChild(card);
      } catch { console.warn("无法加载：", filePath); }
    }
  } catch {
    document.getElementById("empty-tip").style.display = "block";
  }
}

function openArticle(data) {
  document.getElementById("article-list").style.display = "none";
  document.getElementById("reader-view").style.display  = "block";
  document.getElementById("reader-title").textContent   = data.title;
  document.getElementById("reader-meta").textContent    = `${data.source} · ${data.date}`;

  const body = document.getElementById("reader-body");
  body.innerHTML = "";

  // 引言
  if (data.intro) {
    const introDiv = document.createElement("div");
    introDiv.className = "intro-block";
    introDiv.innerHTML = `
      <div class="intro-label">Introducción · 引言</div>
      <div class="intro-es">${data.intro.es}</div>
      <div class="intro-zh">${data.intro.zh}</div>
    `;
    body.appendChild(introDiv);
  }

  // 段落
  data.paragraphs.forEach((para, idx) => {
    const block = document.createElement("div");
    block.className = "paragraph-block";

    // 西语正文：关键词标蓝
    const esDiv = document.createElement("p");
    esDiv.className = "es-text";
    esDiv.innerHTML = highlightKeywords(para.es, para.words);

    // 中文翻译（始终显示）
    const zhDiv = document.createElement("div");
    zhDiv.className = "zh-translation";
    zhDiv.innerHTML = `<div class="zh-label">译文</div>${para.zh}`;

    // 词汇表（始终显示）
    const wordsDiv = document.createElement("div");
    if (para.words && Object.keys(para.words).length > 0) {
      wordsDiv.className = "words-block";
      wordsDiv.innerHTML = `<div class="words-label">词汇 Vocabulario</div>`;
      Object.entries(para.words).forEach(([term, info]) => {
        const item = document.createElement("div");
        item.className = "word-item";
        item.innerHTML = `
          <span class="word-term">${term}</span>
          <span class="word-def"> — ${info.def}</span>
          <span class="word-usage">${info.usage}</span>
        `;
        wordsDiv.appendChild(item);
      });
    }

    block.appendChild(esDiv);
    block.appendChild(zhDiv);
    if (para.words && Object.keys(para.words).length > 0) {
      block.appendChild(wordsDiv);
    }

    // 段落间分隔线（最后一段不加）
    if (idx < data.paragraphs.length - 1) {
      const hr = document.createElement("hr");
      hr.className = "para-divider";
      block.appendChild(hr);
    }

    body.appendChild(block);
  });

  window.scrollTo({ top: 0, behavior: "smooth" });
}

// 关键词标蓝：匹配 words 里的词，整词匹配，不区分大小写
function highlightKeywords(text, words) {
  if (!words) return escapeHtml(text);
  // 按词长降序排列，避免短词覆盖长词
  const terms = Object.keys(words).sort((a, b) => b.length - a.length);
  // 先转义 HTML
  let result = escapeHtml(text);
  terms.forEach(term => {
    // 支持多词短语和单词，整词匹配
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(?<![\\w\\u00C0-\\u024F])(${escaped})(?![\\w\\u00C0-\\u024F])`, 'gi');
    result = result.replace(regex, `<span class="key-word">$1</span>`);
  });
  return result;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("reader-view").style.display  = "none";
  document.getElementById("article-list").style.display = "block";
  document.getElementById("reader-body").innerHTML = "";
});

init();
</script>
</body>
</html>
